{% extends "base.html" %}
{% block title %}Editar Cliente{% endblock %}
{% block content %}
<h1>Editar Cliente — {{ cliente.nome }}</h1>
{% if mensagem %}
<div class="msg {% if sucesso %}success{% else %}error{% endif %}">{{ mensagem }}</div>
{% endif %}
<div class="card">
  <form method="post" action="/dashboard/clientes/{{ cliente.id }}/editar">
    <div class="form-group">
      <label>Nome</label>
      <input type="text" value="{{ cliente.nome }}" disabled class="text-muted">
    </div>
    <div class="form-group">
      <label>CNPJ (somente números)</label>
      <input type="text" name="cnpj" value="{{ cliente.cnpj or '' }}" placeholder="00000000000000" maxlength="18">
    </div>
    <div class="form-group">
      <label>Representante</label>
      <select name="representante_id">
        <option value="">— nenhum —</option>
        {% for r in reps %}
        <option value="{{ r.id }}" {% if cliente.representante_id == r.id %}selected{% endif %}>{{ r.nome }}</option>
        {% endfor %}
      </select>
    </div>
    <div style="display:flex;gap:1rem;margin-top:1.5rem">
      <button type="submit" class="btn btn-primary">Salvar</button>
      <a href="/dashboard/clientes" class="btn">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
