{% extends "base.html" %}
{% block title %}Editar Contato{% endblock %}
{% block content %}
<h1>Editar — {{ contato.nome }}</h1>
{% if mensagem %}
<div class="msg {% if sucesso %}success{% else %}error{% endif %}">{{ mensagem }}</div>
{% endif %}
<div class="card">
  <form method="post" action="/dashboard/contatos/{{ contato.perfil }}/{{ contato.id }}/editar">
    <div class="form-group">
      <label>Perfil</label>
      <input type="text" value="{{ contato.perfil }}" disabled class="text-muted">
    </div>
    <div class="form-group">
      <label>Nome *</label>
      <input type="text" name="nome" value="{{ contato.nome }}" required>
    </div>
    <div class="form-group">
      <label>Celular (formato: 5511999990000)</label>
      <input type="text" name="telefone" value="{{ contato.telefone or '' }}" placeholder="5511999990000">
    </div>
    <div style="display:flex;gap:1rem;margin-top:1.5rem">
      <button type="submit" class="btn btn-primary">Salvar</button>
      <a href="/dashboard/contatos" class="btn">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
