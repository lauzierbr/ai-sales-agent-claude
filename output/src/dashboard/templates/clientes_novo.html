{% extends "base.html" %}
{% block title %}Novo Cliente{% endblock %}
{% block content %}
<h1>Cadastrar Cliente</h1>
{% if mensagem %}
<div class="msg {% if sucesso %}success{% else %}error{% endif %}">{{ mensagem }}</div>
{% endif %}
<div class="card">
  <form method="post" action="/dashboard/clientes/novo">
    <div class="form-group">
      <label>Nome *</label>
      <input type="text" name="nome" value="{{ form.get('nome', '') }}" required placeholder="Razão social">
    </div>
    <div class="form-group">
      <label>CNPJ * (14 dígitos, somente números)</label>
      <input type="text" name="cnpj" value="{{ form.get('cnpj', '') }}" required maxlength="18" placeholder="00000000000000">
    </div>
    <div class="form-group">
      <label>Representante *</label>
      <select name="representante_id" required>
        <option value="">— selecione —</option>
        {% for r in reps %}
        <option value="{{ r.id }}" {% if form.get('representante_id') == r.id %}selected{% endif %}>{{ r.nome }}</option>
        {% endfor %}
      </select>
    </div>
    <div style="display:flex;gap:1rem;margin-top:1.5rem">
      <button type="submit" class="btn btn-primary">Criar cliente</button>
      <a href="/dashboard/clientes" class="btn">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
