apiVersion: 1

datasources:
  - name: VictoriaMetrics
    type: prometheus
    access: proxy
    url: http://victoriametrics:8428
    isDefault: true
    jsonData:
      timeInterval: "15s"

  - name: VictoriaLogs
    type: loki
    access: proxy
    url: http://victorialogs:9428
    jsonData:
      maxLines: 1000
