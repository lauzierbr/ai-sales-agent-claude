name: ai-sales-agent-dev

services:

  # ─────────────────────────────
  # PostgreSQL + pgvector
  # ─────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-sales-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aisales
      POSTGRES_PASSWORD: aisales_dev
      POSTGRES_DB: ai_sales_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aisales"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────
  # Redis
  # ─────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ai-sales-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────
  # Evolution API (WhatsApp)
  # ─────────────────────────────
  evolution:
    image: ai-sales-evolution:2.3.7
    build:
      context: https://github.com/EvolutionAPI/evolution-api.git#2.3.7
    container_name: ai-sales-evolution
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_URL: http://localhost:8080
      AUTHENTICATION_TYPE: apikey
      # API key injetada via Infisical em runtime
      # AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://aisales:aisales_dev@postgres:5432/evolution_api
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─────────────────────────────
  # VictoriaMetrics (métricas + traces)
  # ─────────────────────────────
  victoriametrics:
    image: victoriametrics/victoria-metrics:latest
    container_name: ai-sales-victoria
    restart: unless-stopped
    ports:
      - "8428:8428"
    volumes:
      - victoria_data:/victoria-metrics-data
    command:
      - "--storageDataPath=/victoria-metrics-data"
      - "--retentionPeriod=30d"
      - "--httpListenAddr=:8428"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8428/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────
  # VictoriaLogs (logs com LogQL)
  # ─────────────────────────────
  victorialogs:
    image: victoriametrics/victoria-logs:latest
    container_name: ai-sales-vlogs
    restart: unless-stopped
    ports:
      - "9428:9428"
    volumes:
      - vlogs_data:/vlogs-data
    command:
      - "--storageDataPath=/vlogs-data"
      - "--retentionPeriod=30d"
      - "--httpListenAddr=:9428"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9428/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────
  # OTEL Collector
  # ─────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: ai-sales-otel
    restart: unless-stopped
    ports:
      - "4317:4317"
      - "4318:4318"
      - "13133:13133"
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    depends_on:
      victoriametrics:
        condition: service_healthy
      victorialogs:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/otelcol-contrib", "--version"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────
  # Grafana (visualização unificada)
  # ─────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: ai-sales-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      victoriametrics:
        condition: service_healthy
      victorialogs:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  victoria_data:
  vlogs_data:
  grafana_data:
